<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style type="text/css">
        td {
            font-size: 15;
            text-align: center;
            vertical-align: middle;
        }
        td.name_container {
            width: 200px;
        }
        td.img_container {
            height: 310px;
            width:  210px;
        }
        td.quote_container{
            width: 500px;
        }
        img.poster{
            height: 300px;
            width: 200px;
        }
    </style>
    <title>영화를 소개합니다!</title>
</head>
<body>
    <h1>장준수의 영화 소개 사이트</h1>
    영화의 자세한 정보는 아래 링크를 이용해 주세요!
    <ul>
        <li><a href="https://namu.wiki">나무위키</a></li>
        <li><a href="https://youtube.com">유튜브</a></li>
    </ul>
    <table border="1">
        <caption>나의 3대 영화</caption>
        <tr>
            <td rowspan="2">순위</td>
            <td colspan="3">영화 정보</td>
        </tr>
        <tr>
            <td>제목</td>
            <td>포스터</td>
            <td>명대사</td>
        </tr>
        <tr>
            <td>1</td>
            <td class="name_container">Charlotte's Web</td>
            <td class="img_container"><img class="poster" src="charlottes_web.jpg" alt="Charlotte\'s web\'s poster"></td>
            <td class="quote_container">SOME PIG</td>
        </tr>
        <tr>
            <td>2</td>
            <td class="name_container">마당을 나온 암탉</td>
            <td class="img_container"><img class="poster" src="madang_hen.jpg" alt="마당을 나온 암탉's poster"></td>
            <td class="quote_container">그래 달라. 그게 어때서? 서로 달라도 얼마든지 사랑할 수 있는 거야!</td>
        </tr>
        <tr>
            <td>3</td>
            <td class="name_container">Life of Pi</td>
            <td class="img_container"><img class="poster" src="life_of_pi.jpg" alt="life of pi's poster"></td>
            <td class="quote_container">What kills you is not water, but fear.</td>
        </tr>
    </table>
</body>
</html>
